body{background:#0f1117;font-family:'DM Sans','Segoe UI',sans-serif;color:#f0f0f0;overscroll-behavior:none;}
input,select,button{font-family:inherit;}

.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;}
.navbtn span.icon{font-size:18px;}
.navbtn span.label{font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
.navbtn .dot{width:20px;height:2px;background:#ff6b35;border-radius:2px;}

.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;}
.modal{width:100%;max-width:420px;margin:0 auto;background:#1a1d27;border-radius:24px 24px 0 0;padding:24px 20px 40px;border:1px solid #2a2d3a;max-height:85vh;overflow-y:auto;animation:slideUp 0.25s ease;}
.modal-handle{width:40px;height:4px;background:#2a2d3a;border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:16px;font-weight:800;color:#f0f0f0;margin-bottom:16px;}
.inp{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #2a2d3a;background:#0f1117;color:#f0f0f0;font-size:14px;outline:none;}
.inp-label{font-size:12px;color:#7a7f99;margin-bottom:4px;}
.inp-wrap{margin-bottom:12px;}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:#ff6b35;border:none;color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
.btn-secondary{width:100%;padding:12px;border-radius:10px;border:1px solid #2a2d3a;background:transparent;color:#7a7f99;font-weight:700;font-size:13px;cursor:pointer;margin-top:10px;}

.row{display:flex;justify-content:space-between;align-items:center;}

.prepa-item.done{background:rgba(46,204,113,0.15);border-color:rgba(46,204,113,0.3);}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function badge(text, color) {
  return h('span', {className:`badge badge-${color}`}, text);
}

function card(content, style={}) {
  const d = h('div', {className:'card'});
  if (typeof content === 'string') d.innerHTML = content;
  else if (Array.isArray(content)) content.forEach(c => c && d.appendChild(c));
  else d.appendChild(content);
  Object.assign(d.style, style);
  return d;
}

function st(text) { return h('div', {className:'st'}, text); }

function inp(label, value, type, onChange, placeholder='') {
  const wrap = h('div', {className:'inp-wrap'});
  wrap.appendChild(h('div', {className:'inp-label'}, label));
  const input = h('input', {className:'inp', type, value: value||'', placeholder});
  input.addEventListener('input', e => onChange(e.target.value));
  wrap.appendChild(input);
  return wrap;
}

function modal(title, content, onClose) {

  const box = h('div', {className:'modal'});
  box.appendChild(h('div', {className:'modal-handle'}));
  box.appendChild(h('div', {className:'modal-title'}, title));
  content.forEach(c => c && box.appendChild(c));
  box.appendChild(h('button', {className:'btn-secondary', onClick: onClose}, 'Fermer'));
  bg.appendChild(box);
  return bg;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const frag = document.createDocumentFragment();
  const today = new Date();
  const bas = stocks.filter(s => s.stock > 0 && s.stock < s.seuil);
  const prepa = ["Mayonnaise maison","Sauce burger maison","Pickles oignons rouges","Tomates confites","Pesto maison"];

  const heroCard = card([
    h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}, 
      h('div', {},
        h('div', {style:{fontSize:'12px',color:'#7a7f99',marginBottom:'4px'}}, today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})),
        h('div', {style:{fontSize:'21px',fontWeight:'800',color:'#f0f0f0',fontFamily:'Georgia,serif'}}, 'Bonjour Chef 👨‍🍳'),
        h('div', {style:{fontSize:'12px',color:'#7a7f99',marginTop:'4px'}}, "L'Echouage · Pléneuf-Val-André")
      ),
      h('div', {style:{textAlign:'right'}},
        h('div', {style:{fontSize:'11px',color:'#7a7f99'}}, 'Stocks bas'),
        h('div', {style:{fontSize:'22px',fontWeight:'900',color:bas.length>0?'#e74c3c':'#2ecc71'}}, bas.length>0?bas.length:'OK')
      )
    )
  ], {background:'linear-gradient(135deg,#1a1d27 0%,#23263a 100%)',borderColor:'rgba(255,107,53,0.3)'});
  frag.appendChild(heroCard);

  if (bas.length > 0) {
    const alertCard = card([
      h('div', {style:{fontWeight:'700',color:'#f0f0f0',fontSize:'14px',marginBottom:'6px'}}, '⚠️ Stocks bas'),
      ...bas.slice(0,4).map(s => h('div', {style:{fontSize:'12px',color:'#f39c12',marginBottom:'2px'}}, `• ${s.nom} — ${s.stock} ${s.unite} (min ${s.seuil})`))
    ], {borderLeft:'3px solid #f39c12'});
    frag.appendChild(alertCard);
  }

  frag.appendChild(st('📋 Prépa du jour'));
  prepa.forEach((t, i) => {
    const item = h('div', {className: prepaDone[i] ? 'prepa-item done' : 'prepa-item'});
    const check = h('div', {className: prepaDone[i] ? 'check done' : 'check'}, prepaDone[i] ? '✓' : '');
    check.style.color = '#fff'; check.style.fontSize = '11px'; check.style.fontWeight = '900';
    item.appendChild(check);
    item.appendChild(h('span', {style:{fontSize:'13px',fontWeight:'600',color:prepaDone[i]?'#7a7f99':'#f0f0f0',textDecoration:prepaDone[i]?'line-through':'none'}}, t));
    item.addEventListener('click', () => { prepaDone[i] = !prepaDone[i]; render(); });
    frag.appendChild(item);
  });
  return frag;
}

// ── STOCKS ────────────────────────────────────────────────────────────────────
function renderStocks() {
  const frag = document.createDocumentFragment();
  const familles = [...new Set(stocks.map(s => s.famille))];

  const topRow = h('div', {style:{display:'flex',gap:'8px',marginBottom:'12px'}});
  const searchInp = h('input', {className:'inp', placeholder:'🔍 Rechercher...', style:{flex:'1'}});
  let searchVal = '';
  searchInp.addEventListener('input', e => { searchVal = e.target.value; renderStocksList(listDiv, searchVal); });
  const addBtn = h('button', {style:{padding:'10px 14px',borderRadius:'10px',background:'rgba(255,107,53,0.15)',border:'1px solid rgba(255,107,53,0.4)',color:'#ff6b35',fontWeight:'800',fontSize:'18px',cursor:'pointer'}}, '+');
  addBtn.addEventListener('click', () => { showAddStock = true; render(); });
  topRow.appendChild(searchInp);
  topRow.appendChild(addBtn);
  frag.appendChild(topRow);

  const listDiv = h('div', {});
  renderStocksList(listDiv, '');
  frag.appendChild(listDiv);

  if (editStockId !== null) {
    const s = stocks.find(x => x.id === editStockId);
    if (s) {
      const fields = [
        ['Stock actuel','stock','number'],
        ['Seuil minimum','seuil','number'],
        ['Prix unitaire (€)','prix','number'],
        ['DLC (JJ/MM/AAAA)','dlc','text'],
      ];
      const content = fields.map(([label, field, type]) => {
        const wrap = h('div', {className:'inp-wrap'});
        wrap.appendChild(h('div', {className:'inp-label'}, label));
        const input = h('input', {className:'inp', type, value: s[field]||'', placeholder: field==='dlc'?'JJ/MM/AAAA':''});
        input.addEventListener('input', e => {
          const idx = stocks.findIndex(x => x.id === editStockId);
          if (idx>=0) stocks[idx][field] = type==='number' ? parseFloat(e.target.value)||0 : e.target.value;
        });
        wrap.appendChild(input);
        return wrap;
      });
      const delBtn = h('button', {className:'btn-danger', onClick: () => { stocks = stocks.filter(x => x.id !== editStockId); editStockId = null; render(); }}, '🗑 Supprimer ce produit');
      content.push(delBtn);
      const m = modal(s.nom, content, () => { editStockId = null; render(); });
      frag.appendChild(m);
    }
  }

  if (showAddStock) {
    const fields = [
      ['Nom du produit','nom','text'],
      ['Unité','unite','text'],
      ['Stock actuel','stock','number'],
      ['Seuil minimum','seuil','number'],
      ['Prix unitaire (€)','prix','number'],
    ];
    const content = fields.map(([label, field, type]) => {
      const wrap = h('div', {className:'inp-wrap'});
      wrap.appendChild(h('div', {className:'inp-label'}, label));
      const input = h('input', {className:'inp', type, value: newStock[field]||''});
      input.addEventListener('input', e => newStock[field] = type==='number' ? parseFloat(e.target.value)||0 : e.target.value);
      wrap.appendChild(input);
      return wrap;
    });
    const famWrap = h('div', {className:'inp-wrap'});
    famWrap.appendChild(h('div', {className:'inp-label'}, 'Famille'));
    const sel = h('select', {className:'inp'});
    ['Viandes & Volailles','Poissons','Fruits de mer','Fromages','Légumes','Charcuterie','Épicerie'].forEach(f => {
      const opt = h('option', {value: f}, f);
      if (f === newStock.famille) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', e => newStock.famille = e.target.value);
    famWrap.appendChild(sel);
    content.push(famWrap);
    const saveBtn = h('button', {className:'btn-primary', onClick: () => {
      if (newStock.nom) {
        const id = Math.max(...stocks.map(s=>s.id)) + 1;
        stocks.push({...newStock, id});
        newStock = {nom:"",famille:"Épicerie",unite:"kg",stock:0,seuil:0,prix:0,dlc:""};
        showAddStock = false; render();
      }
    }}, '✓ Ajouter au stock');
    content.push(saveBtn);
    frag.appendChild(modal('➕ Nouveau produit', content, () => { showAddStock = false; render(); }));
  }

  return frag;
}

function renderStocksList(container, search) {
  container.innerHTML = '';
  const familles = [...new Set(stocks.map(s => s.famille))];
  familles.forEach(famille => {
    const items = stocks.filter(s => s.famille === famille && s.nom.toLowerCase().includes(search.toLowerCase()));
    if (!items.length) return;
    container.appendChild(st(famille));
    items.forEach(item => {
      const ratio = item.seuil > 0 ? item.stock / item.seuil : 1;
      const color = item.stock === 0 ? '#7a7f99' : ratio < 0.5 ? '#e74c3c' : ratio < 1 ? '#f39c12' : '#2ecc71';
      const c = h('div', {className:'card', style:{padding:'12px 14px',cursor:'pointer'}});
      c.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:item.seuil>0?'6px':'0'}},
        h('div', {},
          h('div', {style:{fontWeight:'700',fontSize:'13px',color:'#f0f0f0'}}, item.nom),
          item.dlc ? h('div', {style:{fontSize:'10px',color:'#7a7f99',marginTop:'2px'}}, `DLC : ${item.dlc}`) : null
        ),
        h('div', {style:{textAlign:'right',marginLeft:'10px'}},
          h('span', {style:{fontSize:'17px',fontWeight:'900',color}}, String(item.stock)),
          h('span', {style:{fontSize:'11px',color:'#7a7f99'}}, ` ${item.unite}`)
        )
      ));
      if (item.seuil > 0) {
        const barBg = h('div', {className:'stock-bar-bg'});
        const bar = h('div', {className:'stock-bar', style:{width:`${Math.min(100,ratio*100)}%`,background:color}});
        barBg.appendChild(bar);
        c.appendChild(barBg);
      }
      c.addEventListener('click', () => { editStockId = item.id; render(); });
      container.appendChild(c);
    });
  });
}

// ── RECETTES ──────────────────────────────────────────────────────────────────
function renderRecettes() {
  const frag = document.createDocumentFragment();
  const addBtn = h('button', {className:'btn-outline-orange', onClick: () => { showAddRecette = true; render(); }}, '+ Nouvelle fiche recette');
  frag.appendChild(addBtn);

  const cats = [...new Set(recettes.map(r => r.cat))];
  cats.forEach(cat => {
    frag.appendChild(st(cat));
    recettes.filter(r => r.cat === cat).forEach(r => {
      const c = h('div', {className:'card', style:{padding:'12px 14px',cursor:'pointer'}});
      c.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div', {style:{fontWeight:'700',fontSize:'14px',color:'#f0f0f0'}}, r.nom),
        h('div', {style:{textAlign:'right'}},
          h('div', {style:{fontSize:'15px',fontWeight:'900',color:'#ff6b35'}}, r.pv > 0 ? r.pv+'€' : 'Ardoise'),
          h('div', {style:{fontSize:'10px',color:'#7a7f99'}}, r.ings.length+' ingrédients')
        )
      ));
      c.addEventListener('click', () => { selectedRecette = r; render(); });
      frag.appendChild(c);
    });
  });

  if (selectedRecette) {
    const r = selectedRecette;
    const content = [
      h('div', {style:{display:'flex',gap:'8px',marginBottom:'14px'}}, badge('PV : '+(r.pv>0?r.pv+'€':'Ardoise'),'orange'), badge(r.cat,'blue')),
      st('Ingrédients'),
      ...r.ings.map(ing => h('div', {style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #2a2d3a'}},
        h('span', {style:{fontSize:'13px',color:'#f0f0f0'}}, ing)
      ))
    ];
    frag.appendChild(modal(r.nom, content, () => { selectedRecette = null; render(); }));
  }

  if (showAddRecette) {
    const content = [
      inp('Nom du plat', newRecette.nom, 'text', v => newRecette.nom = v),
      h('div', {style:{display:'flex',gap:'8px'}},
        (() => { const wrap = h('div', {className:'inp-wrap',style:{flex:'1'}}); wrap.appendChild(h('div',{className:'inp-label'},'Catégorie')); const sel = h('select',{className:'inp'}); ['Entrées','Plats','Buns','Desserts'].forEach(c=>{const o=h('option',{value:c},c);if(c===newRecette.categorie)o.selected=true;sel.appendChild(o);}); sel.addEventListener('change',e=>newRecette.categorie=e.target.value); wrap.appendChild(sel); return wrap; })(),
        inp('PV (€)', newRecette.pv, 'number', v => newRecette.pv = parseFloat(v)||0)
      ),
      st('Ingrédients'),
      ...newRecette.ingredients.map(ing => h('div', {style:{fontSize:'12px',color:'#f0f0f0',padding:'4px 0',borderBottom:'1px solid #2a2d3a'}}, `${ing.nom} — ${ing.qte}`)),
      (() => {
        const row = h('div', {style:{display:'flex',gap:'6px',marginTop:'10px',marginBottom:'10px'}});
        const nomI = h('input', {className:'inp', placeholder:'Ingrédient', style:{flex:'2'}});
        const qteI = h('input', {className:'inp', placeholder:'Qté', style:{flex:'1'}});
        nomI.addEventListener('input', e => newIng.nom = e.target.value);
        qteI.addEventListener('input', e => newIng.qte = e.target.value);
        const plusBtn = h('button', {style:{padding:'8px 12px',borderRadius:'8px',background:'rgba(46,204,113,0.15)',border:'none',color:'#2ecc71',fontWeight:'800',cursor:'pointer'}}, '+');
        plusBtn.addEventListener('click', () => {
          if (newIng.nom) { newRecette.ingredients.push({...newIng}); newIng={nom:'',qte:''}; render(); }
        });
        row.appendChild(nomI); row.appendChild(qteI); row.appendChild(plusBtn);
        return row;
      })(),
      h('button', {className:'btn-primary', onClick: () => {
        if (newRecette.nom) {
          const id = Math.max(...recettes.map(r=>r.id)) + 1;
          recettes.push({id, nom:newRecette.nom, cat:newRecette.categorie, pv:newRecette.pv, ings:newRecette.ingredients.map(i=>`${i.nom} — ${i.qte}`)});
          newRecette = {nom:"",categorie:"Entrées",pv:0,ingredients:[]};
          showAddRecette = false; render();
        }
      }}, '✓ Enregistrer la recette')
    ];
    frag.appendChild(modal('Nouvelle recette', content, () => { showAddRecette = false; render(); }));
  }

  return frag;
}

// ── HACCP ─────────────────────────────────────────────────────────────────────
function renderHACCP() {
  const frag = document.createDocumentFragment();
  frag.appendChild(card([
    h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div', {},
        h('div', {style:{fontWeight:'800',fontSize:'15px',color:'#2ecc71'}}, '🛡️ HACCP L\'Echouage'),
        h('div', {style:{fontSize:'12px',color:'#7a7f99',marginTop:'2px'}}, 'Traçabilité & températures')
      ),
      badge(`${haccpLogs.filter(l=>l.ok).length}/${haccpLogs.length} conformes`, 'green')
    )
  ], {background:'linear-gradient(135deg,rgba(46,204,113,0.15) 0%,#1a1d27 100%)',borderColor:'rgba(46,204,113,0.3)'}));

  frag.appendChild(st('🌡️ Nouveau relevé'));

  if (!frigoSaved) {
    FRIGOS.forEach(f => {
      const val = frigoTemps[f.key];
      const n = parseFloat(val);
      const ok = val === '' ? null : (n >= f.min && n <= f.max);
      const row = h('div', {className:'frigo-row', style:{
        background: ok===true?'rgba(46,204,113,0.15)':ok===false?'rgba(231,76,60,0.15)':'#0f1117',
        border: `1.5px solid ${ok===true?'rgba(46,204,113,0.4)':ok===false?'rgba(231,76,60,0.4)':'#2a2d3a'}`
      }});
      row.appendChild(h('span', {style:{fontSize:'22px',flexShrink:'0'}}, f.icon));
      row.appendChild(h('div', {style:{flex:'1'}},
        h('div', {style:{fontSize:'13px',fontWeight:'700',color:'#f0f0f0'}}, f.label),
        h('div', {style:{fontSize:'10px',color:'#7a7f99'}}, `Norme : ${f.min}°C à ${f.max}°C`)
      ));
      const tempInp = h('input', {className:'temp-input', type:'number', step:'0.1', placeholder:'—', value: val,
        style:{border:`1.5px solid ${ok===true?'#2ecc71':ok===false?'#e74c3c':'#2a2d3a'}`,color:ok===false?'#e74c3c':'#f0f0f0'}});
      tempInp.addEventListener('input', e => { frigoTemps[f.key] = e.target.value; render(); });
      row.appendChild(tempInp);
      row.appendChild(h('span', {style:{fontSize:'12px',color:'#7a7f99'}}, '°C'));
      row.appendChild(h('span', {style:{fontSize:'16px',width:'20px'}}, ok===true?'✅':ok===false?'🚨':''));
      frag.appendChild(row);
    });

    const allFilled = FRIGOS.every(f => frigoTemps[f.key] !== '');
    const saveBtn = h('button', {style:{
      width:'100%',padding:'14px',borderRadius:'12px',marginTop:'4px',marginBottom:'16px',
      background:allFilled?'#4a9eff':'#2a2d3a',border:'none',
      color:allFilled?'#fff':'#7a7f99',fontWeight:'800',fontSize:'14px',
      cursor:allFilled?'pointer':'default'
    }}, allFilled ? '✓ Enregistrer le relevé' : `Remplis les ${FRIGOS.filter(f=>frigoTemps[f.key]==='').length} temp. restantes`);
    saveBtn.addEventListener('click', () => {
      if (allFilled) {
        const now = new Date().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        const allOk = FRIGOS.every(f => { const n=parseFloat(frigoTemps[f.key]); return n>=f.min&&n<=f.max; });
        haccpLogs.unshift({date:now, temps:{...frigoTemps}, ok:allOk});
        frigoSaved = true;
        setTimeout(() => { frigoSaved=false; frigoTemps={f1:"",f2:"",f3:"",cf:""}; render(); }, 2500);
        render();
      }
    });
    frag.appendChild(saveBtn);
  } else {
    const ok = h('div', {style:{textAlign:'center',padding:'20px 0'}});
    ok.appendChild(h('div', {style:{fontSize:'48px',marginBottom:'12px'}}, '✅'));
    ok.appendChild(h('div', {style:{fontSize:'15px',fontWeight:'800',color:'#2ecc71'}}, 'Relevé enregistré !'));
    frag.appendChild(ok);
  }

  if (haccpLogs.length > 0) {
    frag.appendChild(st('Historique'));
    haccpLogs.forEach(log => {
      const c = h('div', {className:'log-row', style:{background:'#1a1d27',borderColor:log.ok?'#2ecc71':'#e74c3c'}});
      c.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},
        h('span', {style:{fontSize:'12px',color:'#7a7f99'}}, log.date),
        badge(log.ok?'Conforme':'Non conforme', log.ok?'green':'red')
      ));
      const temps = h('div', {style:{display:'flex',gap:'10px',flexWrap:'wrap'}});
      FRIGOS.forEach(f => temps.appendChild(h('span', {style:{fontSize:'11px',color:'#7a7f99'}}, `${f.label}: ${log.temps[f.key]}°C`)));
      c.appendChild(temps);
      frag.appendChild(c);
    });
  }

  return frag;
}

// ── COMMANDES ─────────────────────────────────────────────────────────────────
function renderCommandes() {
  const frag = document.createDocumentFragment();
  const auto = stocks.filter(s => s.stock < s.seuil);

  frag.appendChild(card([
    h('div', {style:{fontSize:'12px',color:'#7a7f99',marginBottom:'4px'}}, 'Commande générée automatiquement'),
    h('div', {style:{fontWeight:'800',fontSize:'15px',color:'#f0f0f0'}}, new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})),
    h('div', {style:{display:'flex',gap:'8px',marginTop:'10px'}}, badge(auto.length+' urgents','red'), badge((auto.length+commandeManuelle.length)+' articles','blue'))
  ], {borderColor:'rgba(255,107,53,0.3)'}));

  if (auto.length > 0) {
    frag.appendChild(st('⚠️ Stocks à réapprovisionner'));
    auto.forEach(s => {
      const c = h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#1a1d27',border:'1px solid rgba(231,76,60,0.4)',borderRadius:'10px',marginBottom:'6px'}});
      c.appendChild(h('div', {style:{display:'flex',alignItems:'center',gap:'10px'}},
        h('div', {style:{width:'8px',height:'8px',borderRadius:'50%',background:'#e74c3c',flexShrink:'0'}}),
        h('div', {},
          h('div', {style:{fontSize:'13px',fontWeight:'600',color:'#f0f0f0'}}, s.nom),
          h('div', {style:{fontSize:'11px',color:'#7a7f99'}}, `Stock : ${s.stock} · Min : ${s.seuil} ${s.unite}`)
        )
      ));
      c.appendChild(h('span', {style:{fontSize:'12px',fontWeight:'700',color:'#ff6b35'}}, 'À commander'));
      frag.appendChild(c);
    });
  }

  if (commandeManuelle.length > 0) {
    frag.appendChild(st('📦 Commande manuelle'));
    commandeManuelle.forEach((c, i) => {
      const row = h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#1a1d27',border:`1px solid ${c.urgence?'rgba(231,76,60,0.4)':'#2a2d3a'}`,borderRadius:'10px',marginBottom:'6px'}});
      row.appendChild(h('div', {},
        h('div', {style:{fontSize:'13px',fontWeight:'600',color:'#f0f0f0'}}, c.produit),
        h('div', {style:{fontSize:'11px',color:'#7a7f99'}}, c.fournisseur)
      ));
      const right = h('div', {style:{display:'flex',alignItems:'center',gap:'8px'}});
      right.appendChild(h('span', {style:{fontSize:'13px',fontWeight:'700',color:'#ff6b35'}}, c.qte));
      const del = h('button', {style:{background:'none',border:'none',color:'#e74c3c',cursor:'pointer',fontSize:'18px'}}, '×');
      del.addEventListener('click', () => { commandeManuelle.splice(i,1); render(); });
      right.appendChild(del);
      row.appendChild(right);
      frag.appendChild(row);
    });
  }

  const addBtn = h('button', {className:'btn-outline-orange', onClick: () => { showAddCommande = true; render(); }}, '+ Ajouter à la commande');
  frag.appendChild(addBtn);

  if ((auto.length + commandeManuelle.length) > 0) {
    const sendBtn = h('button', {className:'btn-primary'}, '📤 Envoyer les commandes');
    frag.appendChild(sendBtn);
  }

  if (showAddCommande) {
    const content = [
      inp('Produit', newCmd.produit, 'text', v => newCmd.produit = v),
      inp('Quantité', newCmd.qte, 'text', v => newCmd.qte = v),
      (() => { const wrap=h('div',{className:'inp-wrap'}); wrap.appendChild(h('div',{className:'inp-label'},'Fournisseur')); const sel=h('select',{className:'inp'}); ['Michard Restauration','Ferme du Pourpray','Marché local','Autre'].forEach(f=>{const o=h('option',{value:f},f);if(f===newCmd.fournisseur)o.selected=true;sel.appendChild(o);}); sel.addEventListener('change',e=>newCmd.fournisseur=e.target.value); wrap.appendChild(sel); return wrap; })(),
      h('button', {className:'btn-primary', onClick: () => {
        if (newCmd.produit && newCmd.qte) {
          commandeManuelle.push({...newCmd});
          newCmd = {produit:"",fournisseur:"Michard Restauration",qte:"",urgence:false};
          showAddCommande = false; render();
        }
      }}, '✓ Ajouter')
    ];
    frag.appendChild(modal('Ajouter à la commande', content, () => { showAddCommande = false; render(); }));
  }

  return frag;
}

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  const nav = document.getElementById('bottomnav');
  content.innerHTML = '';
  nav.innerHTML = '';

  const screens = [renderDashboard, renderStocks, renderRecettes, renderHACCP, renderCommandes];
  content.appendChild(screens[activeScreen]());

  SCREENS.forEach((s, i) => {
    const btn = h('button', {className:'navbtn'});
    btn.appendChild(h('span', {className:'icon'}, ICONS[i]));
    btn.appendChild(h('span', {className:'label', style:{color: i===activeScreen?'#ff6b35':'#7a7f99'}}, s));
    if (i === activeScreen) btn.appendChild(h('div', {className:'dot'}));
    btn.addEventListener('click', () => { activeScreen = i; render(); });
    nav.appendChild(btn);
  });
}

render();
</script>
