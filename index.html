function FrigoModal({onClose}){
  const frigos=[{key:"f1",label:"Frigo 1",icon:"🔵",min:0,max:4},{key:"f2",label:"Frigo 2",icon:"🔵",min:0,max:4},{key:"f3",label:"Frigo Poissons",icon:"🐟",min:0,max:3},{key:"cf",label:"Chambre froide",icon:"❄️",min:-2,max:4}];
  const [temps,setTemps]=useState({f1:"",f2:"",f3:"",cf:""});
  const [saved,setSaved]=useState(false);
  const isOk=(key,val)=>{if(val==="")return null;const f=frigos.find(f=>f.key===key);const n=parseFloat(val);return n>=f.min&&n<=f.max;};
  const allFilled=frigos.every(f=>temps[f.key]!=="");
  const nbAlerts=frigos.filter(f=>isOk(f.key,temps[f.key])===false).length;
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end"}}>
      <div style={{width:"100%",maxWidth:420,margin:"0 auto",background:T.card,borderRadius:"24px 24px 0 0",padding:"24px 20px 40px",border:`1px solid ${T.cb}`}}>
        <div style={{width:40,height:4,background:T.cb,borderRadius:2,margin:"0 auto 20px"}}/>
        {!saved?<>
          <div style={{fontSize:16,fontWeight:800,color:T.text,marginBottom:4}}>🌡️ Relevé températures</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:18}}>Saisis en °C — archivé automatiquement</div>
          {frigos.map(f=>{
            const val=temps[f.key];const ok=isOk(f.key,val);
            return <div key={f.key} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,marginBottom:8,background:ok===true?T.gs:ok===false?T.rs:T.bg,border:`1.5px solid ${ok===true?T.green+"60":ok===false?T.red+"60":T.cb}`,transition:"all 0.2s"}}>
              <span style={{fontSize:22,flexShrink:0}}>{f.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text}}>{f.label}</div>
                <div style={{fontSize:10,color:T.muted}}>Norme : {f.min}°C à {f.max}°C</div>
              </div>
              <input type="number" step="0.1" placeholder="—" value={val} onChange={e=>setTemps(t=>({...t,[f.key]:e.target.value}))} style={{width:58,padding:"8px 6px",borderRadius:8,fontSize:17,fontWeight:800,textAlign:"center",background:T.card,border:`1.5px solid ${ok===true?T.green:ok===false?T.red:T.cb}`,color:ok===false?T.red:T.text,outline:"none"}}/>
              <span style={{fontSize:12,color:T.muted}}>°C</span>
              <span style={{fontSize:16,width:20}}>{ok===true?"✅":ok===false?"🚨":""}</span>
            </div>;
          })}
          <button onClick={()=>setSaved(true)} disabled={!allFilled} style={{width:"100%",padding:14,borderRadius:12,marginTop:8,background:allFilled?T.blue:T.cb,border:"none",color:allFilled?"#fff":T.muted,fontWeight:800,fontSize:14,cursor:allFilled?"pointer":"default",transition:"all 0.2s"}}>
            {allFilled?"✓ Enregistrer le relevé":`Remplis les ${frigos.filter(f=>temps[f.key]==="").length} temp. restantes`}
          </button>
          <button onClick={onClose} style={{width:"100%",padding:10,borderRadius:10,marginTop:8,border:"none",background:"transparent",color:T.muted,fontWeight:700,fontSize:13,cursor:"pointer"}}>Annuler</button>
        </>:<div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:52,marginBottom:12}}>{nbAlerts===0?"✅":"⚠️"}</div>
          <div style={{fontSize:16,fontWeight:800,color:nbAlerts===0?T.green:T.yellow,marginBottom:6}}>Relevé enregistré !</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:20}}>{nbAlerts===0?"Tous les frigos sont conformes 👌":`${nbAlerts} température(s) hors norme — archivée`}</div>

        </div>}
      </div>
    </div>
  );
}

    <ST>Historique traçabilité</ST>
    {logs.map((log,i)=>(
      <Card key={i} style={{padding:"10px 14px",borderLeft:`3px solid ${log.ok?T.green:T.red}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:T.text}}>{log.produit} <span style={{color:T.muted,fontWeight:400}}>· {log.four}</span></div>
            <div style={{fontSize:11,color:T.muted,marginTop:2}}>{log.date} · Lot : {log.lot}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:log.ok?T.green:T.red}}>{log.temp}</div>
            {!log.ok&&<div style={{fontSize:10,color:T.red}}>⚠ Non conforme</div>}
          </div>
        </div>
      </Card>
    ))}
  </div>;
}

function Commandes(){
  const fournisseurs=[
    {nom:"Metro",items:[{produit:"Filet de bœuf",qte:"4 kg",urgence:true},{produit:"Farine T55",qte:"10 kg",urgence:false},{produit:"Crème liquide",qte:"6 L",urgence:false}]},
    {nom:"Transgourmet",items:[{produit:"Saumon frais",qte:"3 kg",urgence:true},{produit:"Saint-Jacques",qte:"2 kg",urgence:false}]},
  ];
  return <div>
    <Card style={{borderColor:T.accent+"40"}}>
      <div style={{fontSize:12,color:T.muted,marginBottom:4}}>Générée automatiquement · Weekend +30%</div>
      <div style={{fontWeight:800,fontSize:15,color:T.text}}>Commande du vendredi 23 mai</div>
      <div style={{display:"flex",gap:8,marginTop:10}}><Badge color="red">2 urgents</Badge><Badge color="blue">5 articles</Badge></div>
    </Card>
    {fournisseurs.map((f,fi)=><div key={fi}>
      <ST>📦 {f.nom}</ST>
      {f.items.map((item,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:T.card,border:`1px solid ${item.urgence?T.red+"50":T.cb}`,borderRadius:10,marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:item.urgence?T.red:T.green,flexShrink:0}}/>
            <span style={{fontSize:13,fontWeight:600,color:T.text}}>{item.produit}</span>
          </div>
          <span style={{fontSize:13,fontWeight:700,color:T.accent}}>{item.qte}</span>
        </div>
      ))}
    </div>)}
    <button style={{width:"100%",padding:14,borderRadius:12,background:T.accent,border:"none",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",marginTop:8}}>📤 Envoyer les commandes</button>
  </div>;
}

function Marges(){
  const plats=[
    {nom:"Filet de bœuf sauce poivre",vendu:18,prix:26,cout:9.2,marge:64.6},
    {nom:"Saumon mi-cuit",vendu:12,prix:22,cout:7.8,marge:64.5},
    {nom:"Magret de canard",vendu:8,prix:24,cout:10.1,marge:57.9},
    {nom:"Crème brûlée maison",vendu:22,prix:7,cout:1.4,marge:80.0},
    {nom:"Tartare de bœuf",vendu:6,prix:20,cout:8.5,marge:57.5},
  ];
  const ca=plats.reduce((s,p)=>s+p.vendu*p.prix,0);
  const avg=plats.reduce((s,p)=>s+p.marge,0)/plats.length;
  return <div>
    <div style={{display:"flex",gap:10,marginBottom:12}}>
      {[{label:"CA semaine",val:`${ca}€`,color:T.accent},{label:"Marge moy.",val:`${avg.toFixed(1)}%`,color:T.green}].map((s,i)=>(
        <Card key={i} style={{flex:1,textAlign:"center",marginBottom:0}}>
          <div style={{fontSize:22,fontWeight:900,color:s.color}}>{s.val}</div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>{s.label}</div>
        </Card>
      ))}
    </div>
    <ST>Analyse par plat</ST>
    {plats.map((p,i)=>(
      <Card key={i} style={{padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div style={{flex:1,marginRight:10}}>
            <div style={{fontSize:13,fontWeight:700,color:T.text}}>{p.nom}</div>
            <div style={{fontSize:11,color:T.muted,marginTop:1}}>Vendu : {p.vendu} · Coût : {p.cout}€ · PV : {p.prix}€</div>
          </div>
          <span style={{fontSize:16,fontWeight:900,color:p.marge>=65?T.green:p.marge>=55?T.yellow:T.red}}>{p.marge}%</span>
        </div>
        <div style={{background:T.cb,borderRadius:4,height:4}}>
          <div style={{width:`${p.marge}%`,height:4,borderRadius:4,background:p.marge>=65?T.green:p.marge>=55?T.yellow:T.red}}/>
        </div>
      </Card>
    ))}
  </div>;
}

const SCREENS=["Dashboard","Stocks","HACCP","Commandes","Marges"];
const ICONS=["⚡","📦","🛡️","🛒","📊"];

function App(){
  const [active,setActive]=useState(0);
  const [scanMode,setScanMode]=useState(null);
  const [frigoOpen,setFrigoOpen]=useState(false);
  const p={openScan:setScanMode,openFrigo:()=>setFrigoOpen(true)};
  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:T.text,display:"flex",justifyContent:"center",padding:"0 0 80px 0"}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{padding:"20px 20px 12px",background:T.bg,position:"sticky",top:0,zIndex:10,borderBottom:`1px solid ${T.cb}`,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:18,fontWeight:900,fontFamily:"Georgia,serif",color:T.text}}><span style={{color:T.accent}}>Chef</span>OS</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:T.green}}/>
              <span style={{fontSize:11,color:T.muted}}>En service</span>
            </div>
          </div>
        </div>
        <div style={{padding:"0 16px"}}>
          {active===0&&<Dashboard {...p}/>}
          {active===1&&<Stocks {...p}/>}
          {active===2&&<HACCP {...p}/>}
          {active===3&&<Commandes/>}
          {active===4&&<Marges/>}
        </div>
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:T.card,borderTop:`1px solid ${T.cb}`,display:"flex",padding:"8px 0 12px",zIndex:20}}>
          {SCREENS.map((s,i)=>(
            <button key={i} onClick={()=>setActive(i)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
              <span style={{fontSize:18}}>{ICONS[i]}</span>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:0.5,color:active===i?T.accent:T.muted,textTransform:"uppercase"}}>{s.split(" ")[0]}</span>
              {active===i&&<div style={{width:20,height:2,background:T.accent,borderRadius:2}}/>}
            </button>
          ))}
        </div>
      </div>
      {scanMode&&<ScanModal mode={scanMode} onClose={()=>setScanMode(null)}/>}
      {frigoOpen&&<FrigoModal onClose={()=>setFrigoOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
